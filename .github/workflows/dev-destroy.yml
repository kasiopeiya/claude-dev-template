# 責務: コスト節約のため、dev 環境のスタックをスケジュールで削除する。
# この設計では PR を push すれば dev 環境が自動で作り直されるため、削除しっぱなしでも困らない。

name: dev-destroy
run-name: dev-destroy (${{ github.ref_name }})

on:
  schedule:
    - cron: '00 4,14 * * *'
  workflow_dispatch:
    inputs:
      stack:
        type: choice
        description: target stack
        default: dev/*
        options:
          - dev/*

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read
    env:
      ENV_NAME: ${{ vars.ENV_NAME }}
      # parameter.ts が読むのは process.env.ACCOUNT_ID
      ACCOUNT_ID: ${{ secrets.DEV_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1
      - run: aws sts get-caller-identity

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json

      # cdk コマンドは infra/ の依存にしか存在しない
      - run: npm ci
        working-directory: infra

      - run: npx cdk destroy -f "$STACK_NAME"
        working-directory: infra
        env:
          STACK_NAME: ${{ github.event.inputs.stack || 'dev/*' }}
