# 責務: topic ブランチへの push から、マージ可否の判定までを担う唯一のパイプライン。
# なぜこの構成なのかは docs/design/cicd-design.md を参照する。

name: pipeline
run-name: pipeline (${{ github.ref_name }})

# git-policy の7プレフィックスのみを対象にし、ブランチ命名規約を仕組みで強制する。
# 代償として、これ以外のブランチは checks が1つも走らず無言でマージ不可になる（cicd-design「既知の制約」）。
# workflow レベルの paths フィルタは使わない。ワークフローごとスキップされると required check が
# pending のまま残り、PR が永久にマージできなくなるため（job レベルの skip とは挙動が違う）。
on:
  push:
    branches:
      - 'feat**'
      - 'fix**'
      - 'refactor**'
      - 'chore**'
      - 'ci**'
      - 'test**'
      - 'docs**'
      # Dependabot は dependabot/github_actions/... を切る。7プレフィックスのどれにも
      # 当たらないため、足さないとその PR は checks が走らず無言でマージ不可になる。
      - 'dependabot**'

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      # --fill は base..head 間のコミットを local git から読むため、全履歴が要る
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # 重複判定はタイトルではなくブランチで行う。--fill はコミットごとにタイトルが変わるため、
      # タイトル検索だと毎 push で新しい PR ができてしまう。
      - name: Create pull request if absent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "pull request already exists for $BRANCH"
            exit 0
          fi
          # 本文はコミットメッセージから生成する。git-policy が既にコミットへ「なぜ」を
          # 書くことを義務付けており、同じ内容を人間に2度書かせないため（--fill）。
          gh pr create --base main --head "$BRANCH" --fill

  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      app_changed: ${{ steps.detect.outputs.app_changed }}
      cdk_changed: ${{ steps.detect.outputs.cdk_changed }}
    steps:
      # merge-base を求めるため全履歴が要る
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: detect
        run: |
          changed=$(git diff --name-only origin/main...HEAD)
          echo "changed files:"
          echo "$changed"

          if [ -z "$changed" ]; then
            # 判定材料が無いときは検査を省かない側へ倒す
            docs_only=false
          elif grep -qvE '^(docs/|[^/]*\.md$)' <<< "$changed"; then
            docs_only=false
          else
            docs_only=true
          fi

          if grep -qE '^app/' <<< "$changed"; then app_changed=true; else app_changed=false; fi
          if grep -qE '^infra/' <<< "$changed"; then cdk_changed=true; else cdk_changed=false; fi

          echo "docs_only=$docs_only" | tee -a "$GITHUB_OUTPUT"
          echo "app_changed=$app_changed" | tee -a "$GITHUB_OUTPUT"
          echo "cdk_changed=$cdk_changed" | tee -a "$GITHUB_OUTPUT"

  # prettier は .md も検査対象にしており、docs_only でも整形崩れを検出する必要があるため
  # ci-common から切り出し常に実行する。root の依存だけで完結し型情報を要らないので、
  # 3階層分の npm ci が要る ci-common と違い軽量に保てる（cicd-design）。
  ci-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run format:check

  # policy hook（.claude/hooks/policy-loader.mjs）の回帰検査。docs/policy の frontmatter だけを
  # 直す PR は docs_only 判定で ci-common がスキップされるため、その中に置くと「hook を壊す変更で
  # こそ検査が走らない」。ci-format と同じ理由で、変更種別に関わらず常に実行する独立ジョブにする。
  # root の依存だけで完結し軽量（ci-format と同型）。
  ci-policy-hook:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run test:policy-hook

  # リポジトリ全体を1回で舐めるツール。静的解析はルールを1箇所で定義しているため
  # 階層ごとに分割・スキップできない（cicd-design）。
  ci-common:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # キャッシュキーはジョブのスコープごとに分ける。cache-dependency-path が
      # キーのハッシュ元になるため、参照する lock ファイルが違えばキーも分かれる。
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/backend/package-lock.json
            infra/package-lock.json

      # eslint.config.mjs の型対応 lint（projectService: true）が TS の型情報を要求するため、
      # 3階層すべての node_modules が揃っていないと動かない。共通だから軽い、は誤り。
      - run: npm ci
      - run: npm ci
        working-directory: app/backend
      - run: npm ci
        working-directory: infra
      # プロジェクトのコーディング規約の適用
      - run: npm run lint
      # ESLintカスタムルールの適用
      - run: npm run test:rule
      # 未使用のexport・未使用のファイル・未使用の依存パッケージなどを検出
      - run: npm run knip

      # 脆弱性は「どこを変更したか」ではなく「このリポジトリが危ういか」の事実。だから
      # ci-app / ci-cdk に分けて条件実行にしない（infra の脆弱性が app だけの PR で見えなくなる）。
      # high 未満で落とさないのは、受容するかが人間の判断だから（cicd-policy）。
      # 1つ落ちても残りを検査してから赤にする（往復させないため）。
      - name: Audit npm dependencies
        run: |
          failed=""
          for dir in . app/backend infra; do
            echo "::group::npm audit ($dir)"
            npm audit --audit-level=high --prefix "$dir" || failed="$failed $dir"
            echo "::endgroup::"
          done

          if [ -n "$failed" ]; then
            echo "::error::high or critical vulnerabilities found in:$failed"
            exit 1
          fi
          echo "no high or critical vulnerabilities"

  # app 固有の検査。ルールが app/backend に閉じているため条件実行できる（ci-common との違い）。
  ci-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/backend/package-lock.json

      - run: npm ci
        working-directory: app/backend
      - run: npm run typecheck
        working-directory: app/backend
      # 単体テストに加え、レイヤー依存・循環依存・凝集度(LCOM)のアーキテクチャ規約テスト（archunit）も実行
      - run: npm run test
        working-directory: app/backend

  # cdk 固有の検査。
  ci-cdk:
    needs: detect-changes
    if: needs.detect-changes.outputs.cdk_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - run: npm ci
        working-directory: infra
      # 合成したCloudFormationテンプレート全体をスナップショットと比較し、意図しない差分を検知
      - run: npm run test:snap
        working-directory: infra
      # 暗号化設定・アラーム有無など、リソースの個別プロパティをピンポイントで検査（fine-grained assertions）
      - run: npm run test:fga
        working-directory: infra

  # この設計の芯。deploy の成功がレビューの Entry Criteria になる（cicd-design）。
  # app 変更でも deploy する。今日の構成では infra と app は独立しており cdk 変更のみで足りるが、
  # テンプレートのコピー先で app が NodejsFunction にバンドルされた瞬間、app だけの PR が
  # deploy されず gate が緑のまま通る＝Entry Criteria が誰にも気づかれずに無効化されるため。
  cdk-deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true' || needs.detect-changes.outputs.cdk_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # dev は1環境しかない。ブランチを跨いで直列化しないと、並行 deploy が互いの結果を壊し
    # Entry Criteria の証拠にならない。実行中の deploy は中断させない（cancel-in-progress: false）。
    concurrency:
      group: cdk-deploy-dev
      cancel-in-progress: false
    permissions:
      contents: read
      # OIDC で AWS へ認証するために必要。下の AWS 認証と同時に解除する（#31）
      # id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/package-lock.json

      # cdk コマンドは infra/ の依存にしか存在しない
      - run: npm ci
        working-directory: infra

      # ここから下は #31（OIDC ロールの構築）の完了まで動かせないため、コメントアウトしている。
      # AWS アカウント・OIDC ロール・secrets.ROLE_TO_ASSUME がまだ無く、認証ステップが必ず落ちて
      # cicd-gate を赤にするため、cdk deploy だけでなく AWS 認証ごと外す。
      # #31 の完了後、この段落全体のコメントを外し、上の id-token: write も併せて解除する。
      #
      # - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      #   with:
      #     role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
      #     aws-region: ap-northeast-1
      #
      # # deploy 対象は devParameter.prefix（infra/parameter.ts）由来のスタック名で選ぶ。
      # # bin/app.ts は dev/stg/prd の3環境すべてを synth するため、対象の絞り込みが要る。
      # - name: Show cdk diff in job summary
      #   working-directory: infra
      #   env:
      #     ACCOUNT_ID: ${{ secrets.DEV_ACCOUNT_ID }}
      #     STACK_NAME: kasio-dev-*
      #   run: |
      #     {
      #       echo '## cdk diff'
      #       echo '```'
      #       npx cdk diff "$STACK_NAME" 2>&1
      #       echo '```'
      #     } >> "$GITHUB_STEP_SUMMARY"
      #
      # - working-directory: infra
      #   env:
      #     ACCOUNT_ID: ${{ secrets.DEV_ACCOUNT_ID }}
      #     STACK_NAME: kasio-dev-*
      #   run: npx cdk deploy --require-approval never "$STACK_NAME"

  # 器だけ置く。検証する対象がまだ無いため中身は空（#31 完了後の deploy が前提）。
  integration-test:
    needs: cdk-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - run: echo "no integration tests yet"

  # マージ可否を決める唯一の required check。
  # GitHub は「実行しなかった」を「成功」と同じものとして扱うため、上流に needs で繋ぐだけの
  # ゲートは検査が丸ごと走らなかったときに赤くならずに静かに開く。
  # 未実行は検証の不在であって、検証の成功ではない（cicd-design）。
  cicd-gate:
    needs:
      [
        create-pull-request,
        detect-changes,
        ci-format,
        ci-policy-hook,
        ci-common,
        ci-app,
        ci-cdk,
        cdk-deploy,
        integration-test
      ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify upstream job results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS"
          # skipped は許す。上流が落ちて連鎖的に skipped になった場合でも、
          # 落ちたジョブ自身が failure として needs に現れるため取りこぼさない。
          bad=$(jq -r 'to_entries[]
            | select(.value.result == "failure" or .value.result == "cancelled")
            | "\(.key): \(.value.result)"' <<< "$NEEDS")

          if [ -n "$bad" ]; then
            echo "::error::upstream jobs did not pass"
            echo "$bad"
            exit 1
          fi
          echo "all upstream jobs passed or were intentionally skipped"

  # cicd-gate 成功後に走る advisory な AI ジョブ（cicd-design「AI は advisory」）。
  # 対象 PR に対し ①本文の AI 書き換え ②pr-label ③（needs-human-review 付与時のみ）pr-check を行う。
  # ★ この job は cicd-gate の needs に含めない。含めると AI の非決定性が required check に入り、
  #   Claude の障害やブレでマージが止まる（cicd-design「AI を cicd-gate に入れてブロックする」却下案）。
  #   gate の後段に置くことで、マージ可否の判定（gate）には一切影響しない副作用だけを担う。
  # ★ contents は read に固定する。GitHub Actions の権限は job 単位のため、merge 権限（contents: write）を
  #   この AI job に置くと「差分の prompt injection → git push で main 改ざん」の経路が構造的に開く（#66）。
  #   merge が要る ④auto-merge は後段の別 job（auto-merge）に分離し、この job から write を剥がす。
  # ★ Bash は無制限にせず skill が実際に使う gh サブコマンドだけを許可する。injection が通っても
  #   env+curl 等による secret 外部送信へ到達させないため（#65）。
  ai-advisory:
    needs: cicd-gate
    # needs だけでも gate 成功時のみ走るが、advisory であることを明示するため success() を置く。
    if: ${{ success() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # AI ステップには merge 権限を渡さない（#66）。skill は gh pr diff/view で読むだけ。
      contents: read
      # PR 本文の書き換え（gh pr edit --body）・コメント（gh pr comment）・PR へのラベル付与
      pull-requests: write
      # pr-label は不足ラベルを gh label create で自己作成する。リポジトリのラベル作成は
      # issues スコープに属し pull-requests: write では作れないため、最小限追加する
      # （テンプレートのコピー先でも手動セットアップ無しで動く自己完結性を保つ）。
      issues: write
    outputs:
      # 後段の auto-merge job へ解決済み PR 番号を渡す（job 分割に伴う受け渡し・#66）。
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      # skill 定義（.claude/skills/）とポリシー（docs/policy/）を Claude が読むため checkout する。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # push イベントには PR コンテキストが無い。create-pull-request が作った PR をブランチから引く。
      - name: Resolve PR number for branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          num=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            echo "::warning::no open PR found for $BRANCH; skipping AI advisory"
          fi
          echo "number=$num" | tee -a "$GITHUB_OUTPUT"

      # AI 実行は Anthropic 公式 Action をサブスク OAuth 認証で使う（cicd-design 採用理由の表）。
      # モデルは pr-label の判断に十分な Sonnet 5 単一。allowedTools は skill・ポリシーの読み取り
      # （Read/Grep/Glob）と、pr-label / pr-check / 本文書き換えが実際に使う gh サブコマンドだけに
      # 絞る（Bash 無制限をやめる・#65）。git 直叩きは使わないため許可しない。
      - name: Run AI advisory (rewrite body / pr-label / pr-check)
        if: steps.pr.outputs.number != ''
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh label list:*),Bash(gh label create:*)"
          prompt: |
            あなたはこのリポジトリの CI 上で動く advisory エージェントです。
            対象は PR #${{ steps.pr.outputs.number }}（base: main）。
            マージ・承認・クローズ・ブランチ削除は絶対に行わないこと。以下の3タスクを上から順に実行する。

            ## タスク1: PR本文のAI書き換え
            `gh pr diff ${{ steps.pr.outputs.number }}` で差分全体を読み、「何を・なぜ変えたか」を
            人間の言葉で説明する PR 本文を作成し、`gh pr edit ${{ steps.pr.outputs.number }} --body '<本文>'`
            で反映する。コミットメッセージの機械的な要約ではなく、差分から読み取った意図を簡潔に記述する。

            ## タスク2: ラベル付与（pr-label）
            `.claude/skills/pr-label/SKILL.md` を読み、そこに書かれた手順・基準
            （参照先の docs/policy/pr-review-policy.md を含む）に厳密に従って、
            PR #${{ steps.pr.outputs.number }} に「変更の種類」ラベルと
            needs-human-review / needs-manual-triage を付与する。

            ## タスク3: 前提条件チェック（pr-check・条件付き）
            タスク2で **needs-human-review ラベルを付けた場合のみ** 実行する。付けていなければスキップする。
            `.claude/skills/pr-check/SKILL.md` を読み、その手順に従って
            PR #${{ steps.pr.outputs.number }} をチェックする（NG のときだけ PR に1件コメントする）。

  # ④auto-merge の有効化（cicd-design の capstone）。AI を実行せず、ラベルを読んで gh pr merge --auto
  # するだけの決定論 job（cicd-policy「機械に委ねてよいのは正解が一意に決まる作業だけ」）。
  # ★ ai-advisory から独立 job に分けることで、merge に要る contents: write を AI ステップから剥がす（#66）。
  #   起動条件も決定論（ai-advisory success ＝ gate 成功、かつ needs-human-review ラベルが無い）。
  #   pr-check の NG はここに影響しない——needs-human-review 無しなら pr-check 自体を実行しておらず、
  #   判定材料はラベルだけ。gate 成功待ちは GitHub ネイティブ auto-merge に委ねる（gate が required
  #   check である限り守られる）。
  auto-merge:
    needs: ai-advisory
    # PR が解決できたとき（＝AI advisory が走ったとき）だけ実行する。
    if: ${{ success() && needs.ai-advisory.outputs.pr_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # merge にのみ必要な write。AI を実行しないこの job だけに閉じ込める。
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge when no human review is needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ needs.ai-advisory.outputs.pr_number }}
        run: |
          labels=$(gh pr view "$PR" --json labels --jq '.labels[].name')
          if grep -qx 'needs-human-review' <<< "$labels"; then
            echo "needs-human-review is set; leaving PR #$PR open for human review (no auto-merge)"
            exit 0
          fi
          echo "no needs-human-review label; enabling auto-merge (merge commit) for PR #$PR"
          gh pr merge "$PR" --auto --merge
