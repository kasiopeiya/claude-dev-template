# 責務: pipeline 完了後に、その PR へ advisory な AI 処理（本文書き換え・pr-label・pr-check）と
#       auto-merge を行う。マージ可否の判定（cicd-gate）には一切関与しない。
# なぜこの構成なのかは docs/design/cicd-design.md を参照する。

name: pr-ai-triage

# claude-code-action は push イベント非対応のため、pipeline の完了を workflow_run で受ける。
# 定義は常に main から取られ PR 側から改変できず、fork PR は起点になれない（詳細: cicd-design）。
on:
  workflow_run:
    workflows: [pipeline]
    types: [completed]

permissions: {}

defaults:
  run:
    shell: bash

# 同一ブランチの pipeline が連続完了しても AI を重ねて走らせない。
concurrency:
  group: pr-ai-triage-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  # 対象 PR に対し ①本文の AI 書き換え ②pr-label ③（needs-human-review 付与時のみ）pr-check を行う。
  # 権限は prompt injection 前提で設計する——contents: read 固定・Bash は gh 限定
  # （#65/#66。理由は cicd-design「採用理由」を参照）。Write は本文・コメントを
  # ファイル経由（--body-file）で渡すためにスコープ無しで許可する（理由は prompt 内に記載）。
  pr-triage:
    # pipeline が成功したときだけ走る。失敗・キャンセル時は advisory 不要。
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # AI ステップには merge 権限を渡さない（#66）。skill は gh pr diff/view で読むだけ。
      contents: read
      # PR 本文の書き換え（gh pr edit --body）・コメント（gh pr comment）・PR へのラベル付与
      pull-requests: write
      # 不足ラベルの自己作成（gh label create）に必要。ラベル作成は issues スコープに属する
      issues: write
    outputs:
      # 後段の auto-merge job へ解決済み PR 番号を渡す（#66）。
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      # skill 定義とポリシーを main（PR 改変を受けない正典）から読むため checkout する。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # workflow_run には PR コンテキストが無い。トリガー元 pipeline の head ブランチから PR を引く。
      - name: Resolve PR number for branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          num=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            echo "::warning::no open PR found for $BRANCH; skipping AI advisory"
          fi
          echo "number=$num" | tee -a "$GITHUB_OUTPUT"

      # 公式 Action＋サブスク OAuth 認証。モデルは pr-label の判断に十分な Sonnet 5 単一。
      # allowedTools を絞る理由は cicd-design「採用理由」を参照。
      - name: Run AI advisory (rewrite body / pr-label / pr-check)
        id: advisory
        if: steps.pr.outputs.number != ''
        uses: anthropics/claude-code-action@44423bdec74b97d67543eb16c110546762c110b2 # v1.0.181
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Read,Grep,Glob,Write,Bash(gh pr diff:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh label list:*),Bash(gh label create:*)"
          prompt: |
            あなたはこのリポジトリの CI 上で動く advisory エージェントです。
            対象は PR #${{ steps.pr.outputs.number }}（base: main）。
            マージ・承認・クローズ・ブランチ削除は絶対に行わないこと。以下の3タスクを上から順に実行する。

            ## 使えるツール（厳守・無駄な試行でトークンと時間を浪費しないため）
            allowedTools は Read/Grep/Glob/Write と、次の**6つの gh サブコマンドだけ**。これ以外は
            すべて拒否される（回り道は全て失敗するので試みない）:
            - `gh pr diff` / `gh pr view` / `gh pr edit` / `gh pr comment` / `gh label list` / `gh label create`
            - **`gh pr list` は許可されていない**（対象 PR 番号は上で渡済みなので不要）。他の gh も不可。
            - **`cat`・`printf`・`echo`・heredoc（`<<EOF`）・コマンド置換（`$(...)`）・ANSI-C
              クオート（`$'…'`）はすべて拒否される**。本文の組み立てにシェルを使わないこと。

            ## 本文・コメントの反映方法（--body-file ルール・全タスク共通）
            PR 本文も PR コメントも、必ず次の2ステップで反映する。これが唯一の許可された方法:
            1. **Write ツール**で本文をファイルに書く（例: `pr-body.md`、`pr-comment.md`）。
               markdown 見出し（`#`）・改行・記号は自由に使ってよい。
            2. そのファイルを `gh pr edit <番号> --body-file pr-body.md` /
               `gh pr comment <番号> --body-file pr-comment.md` で渡す。
            `--body` に本文を直接埋め込む形は使わない——長文・特殊クオートを含むコマンド行は
            権限マッチャが安全と判定できず、gh コマンドが allowlist にあっても拒否される。
            **SKILL.md が `--body "$(cat <<'EOF' … )"` の形で例示していても、CI ではそれに従わず、
            上記の Write + `--body-file` に置き換える。**

            **通る書き方を探す実験をしてはならない。** 上の形式で1回だけ実行し、拒否されたらその
            タスクは諦めて次のタスクへ進む。書き方を順に変えて再試行したり、確認用の
            テストコメントを PR に投稿したりしないこと（実行時間を浪費し、実 PR にゴミが残るため）。

            ## タスク1: PR本文のAI書き換え
            `gh pr diff ${{ steps.pr.outputs.number }}` で差分全体を読み、「何を・なぜ変えたか」を
            人間の言葉で説明する PR 本文を作成し、上記「--body-file ルール」で反映する。コミットメッセージの
            機械的な要約ではなく、差分から読み取った意図を簡潔に記述する。

            ## タスク2: ラベル付与（pr-label）
            `.claude/skills/pr-label/SKILL.md` を読み、そこに書かれた手順・基準
            （参照先の docs/policy/pr-review-policy.md を含む）に厳密に従って、
            PR #${{ steps.pr.outputs.number }} に「変更の種類」ラベルと
            needs-human-review / needs-manual-triage を付与する。

            ## タスク3: 前提条件チェック（pr-check・条件付き）
            タスク2で **needs-human-review ラベルを付けた場合のみ** 実行する。付けていなければスキップする。
            `.claude/skills/pr-check/SKILL.md` を読み、その手順に従って
            PR #${{ steps.pr.outputs.number }} をチェックする（NG のときだけ PR に1件コメントする）。

            ## 最終出力: 実行サマリ（可観測性・#69）
            すべて終えたら、最後のメッセージで次の3行を必ず出力する。後続の決定論ステップが
            この本文をラン サマリへ転記し、「何をしたか」を毎ラン残す（沈黙とスキップ／失敗を区別可能にする）。
            - task1（本文書き換え）: 実施 / 未実施（一言で理由）
            - task2（ラベル）: 付与したラベルを列挙（needs-human-review の有無を明記）。
              needs-human-review を付けた場合は、投稿した根拠コメントの URL も併記する
            - task3（pr-check）: 実行した(OK / NG) / スキップ（needs-human-review 無しのため）

      # 実行サマリと拒否コマンドだけを決定論でラン サマリへ転記する（#69。全メッセージを
      # 公開しない理由は cicd-design 参照）。AI が失敗しても痕跡を残すため always()。
      - name: Summarize advisory outcome
        if: ${{ always() && steps.pr.outputs.number != '' }}
        env:
          EXECUTION_FILE: ${{ steps.advisory.outputs.execution_file }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          echo "## AI advisory outcome — PR #$PR" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "_実行ログ無し（AI ステップが走らなかった／ログ未生成）_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # 実行ログは全メッセージの JSON 配列。末尾の result メッセージだけを取り出す。
          result=$(jq -r 'map(select(.type=="result")) | last // {} | .result // empty' "$EXECUTION_FILE")
          {
            echo "### 実行サマリ（task1/2/3）"
            printf '```\n%s\n```\n' "${result:-（サマリ出力なし）}"
          } >> "$GITHUB_STEP_SUMMARY"
          # 拒否された具体コマンド（#65 allowlist の過不足判断の材料）。
          denials=$(jq -r 'map(select(.type=="result")) | last // {} | .permission_denials // [] | .[] | "- `\(.tool_name)`: \(.tool_input | tostring)"' "$EXECUTION_FILE")
          {
            echo "### permission_denials（拒否された具体コマンド）"
            echo "${denials:-_なし_}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ラベルを読んで gh pr merge --auto するだけの決定論 job。merge に要る contents: write を
  # AI job から剥がすための分離（#66。詳細: cicd-design）。判定材料はラベルだけで、
  # gate 成功待ちは GitHub ネイティブ auto-merge に委ねる。
  auto-merge:
    needs: pr-triage
    # pr-triage が成功し PR を解決できたときだけ（pr-triage 失敗・skip 時は連鎖 skip）。
    if: ${{ needs.pr-triage.result == 'success' && needs.pr-triage.outputs.pr_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # merge にのみ必要な write。AI を実行しないこの job だけに閉じ込める。
      contents: write
      pull-requests: write
    steps:
      # gh pr view/merge は git リモートからリポジトリ文脈を解決するため checkout が要る。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable auto-merge when no human review is needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ needs.pr-triage.outputs.pr_number }}
        run: |
          labels=$(gh pr view "$PR" --json labels --jq '.labels[].name')
          if grep -qx 'needs-human-review' <<< "$labels"; then
            echo "needs-human-review is set; leaving PR #$PR open for human review (no auto-merge)"
            exit 0
          fi
          echo "no needs-human-review label; enabling auto-merge (merge commit) for PR #$PR"
          gh pr merge "$PR" --auto --merge
