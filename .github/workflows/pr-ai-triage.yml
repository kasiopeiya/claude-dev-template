# 責務: pipeline 完了後に、その PR へ advisory な AI 処理（本文書き換え・pr-label・pr-check）と
#       auto-merge を行う。マージ可否の判定（cicd-gate）には一切関与しない。
# なぜこの構成なのかは docs/design/cicd-design.md を参照する。

name: pr-ai-triage

# pipeline は push トリガーだが、claude-code-action は push イベントを受け付けない
# （Unsupported event type: push）。受け付けるのは pull_request 系と workflow_dispatch /
# workflow_run 等に限られる。そこで pipeline の完了を workflow_run で受けて AI を走らせる。
# 利点: ①「gate 成功後に advisory」という順序を保てる ②workflow_run はワークフロー定義を
# 常にデフォルトブランチ（main）から取るため、PR 側ブランチから AI 実行手順を書き換えられない
# ③トリガー元の pipeline が push 限定＝信頼済みの push 権限者のみ＝fork PR は起点になれない。
on:
  workflow_run:
    workflows: [pipeline]
    types: [completed]

permissions: {}

defaults:
  run:
    shell: bash

# 同一ブランチの pipeline が連続完了しても AI を重ねて走らせない。
concurrency:
  group: pr-ai-triage-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  # 対象 PR に対し ①本文の AI 書き換え ②pr-label ③（needs-human-review 付与時のみ）pr-check を行う。
  # ★ contents は read に固定する。GitHub Actions の権限は job 単位のため、merge 権限（contents: write）を
  #   この AI job に置くと「差分の prompt injection → git push で main 改ざん」の経路が構造的に開く（#66）。
  #   merge が要る auto-merge は後段の別 job に分離し、この job から write を剥がす。
  # ★ Bash は無制限にせず skill が実際に使う gh サブコマンドだけを許可する。injection が通っても
  #   env+curl 等による secret 外部送信へ到達させないため（#65）。
  pr-triage:
    # pipeline が成功したときだけ走る。失敗・キャンセル時は advisory 不要。
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # AI ステップには merge 権限を渡さない（#66）。skill は gh pr diff/view で読むだけ。
      contents: read
      # PR 本文の書き換え（gh pr edit --body）・コメント（gh pr comment）・PR へのラベル付与
      pull-requests: write
      # pr-label は不足ラベルを gh label create で自己作成する。リポジトリのラベル作成は
      # issues スコープに属し pull-requests: write では作れないため、最小限追加する
      # （テンプレートのコピー先でも手動セットアップ無しで動く自己完結性を保つ）。
      issues: write
    outputs:
      # 後段の auto-merge job へ解決済み PR 番号を渡す（#66）。
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      # skill 定義（.claude/skills/）とポリシー（docs/policy/）を Claude が読むため checkout する。
      # workflow_run では既定でデフォルトブランチ（main）を取得する。PR 側の改変を受けない正典を読む。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # workflow_run には PR コンテキストが無い。トリガー元 pipeline の head ブランチから PR を引く。
      - name: Resolve PR number for branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          num=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            echo "::warning::no open PR found for $BRANCH; skipping AI advisory"
          fi
          echo "number=$num" | tee -a "$GITHUB_OUTPUT"

      # AI 実行は Anthropic 公式 Action をサブスク OAuth 認証で使う（cicd-design 採用理由の表）。
      # モデルは pr-label の判断に十分な Sonnet 5 単一。allowedTools は skill・ポリシーの読み取り
      # （Read/Grep/Glob）と、pr-label / pr-check / 本文書き換えが実際に使う gh サブコマンドだけに
      # 絞る（Bash 無制限をやめる・#65）。git 直叩きは使わないため許可しない。
      - name: Run AI advisory (rewrite body / pr-label / pr-check)
        id: advisory
        if: steps.pr.outputs.number != ''
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh label list:*),Bash(gh label create:*)"
          prompt: |
            あなたはこのリポジトリの CI 上で動く advisory エージェントです。
            対象は PR #${{ steps.pr.outputs.number }}（base: main）。
            マージ・承認・クローズ・ブランチ削除は絶対に行わないこと。以下の3タスクを上から順に実行する。

            ## 使えるコマンド（厳守・無駄な試行でトークンと時間を浪費しないため）
            allowedTools は Read/Grep/Glob と、次の**6つの gh サブコマンドだけ**。これ以外は
            すべて拒否される（回り道は全て失敗するので試みない）:
            - `gh pr diff` / `gh pr view` / `gh pr edit` / `gh pr comment` / `gh label list` / `gh label create`
            - **`gh pr list` は許可されていない**（対象 PR 番号は上で渡済みなので不要）。他の gh も不可。
            - **Write ツール・`cat`・heredoc（`<<EOF`）・コマンド置換（`$(...)`）・一時ファイル作成は
              すべて拒否される**。SKILL.md がコメント例で `cat` ヒアドキュメントを使っていても、
              CI では**それに従わず**、下記「本文・コメントの反映方法」の1物理行形式で書くこと。

            ## 本文・コメントの反映方法（1物理行ルール・全タスク共通）
            PR 本文（`gh pr edit --body`）も PR コメント（`gh pr comment --body`）も、複数行の文章は
            必ず**1物理行**の `--body $'…\n…'` で渡す。改行は ANSI-C クオート（`$'...'`）内の `\n` で
            表現し、本文中のシングルクォートは `\'` でエスケープする。コマンドを複数行に跨がせると
            権限マッチャが改行で分割し、継続行を gh 以外とみなして拒否するため、必ずコマンド全体を
            1行に収める。**SKILL.md が `--body "$(cat <<'EOF' … )"` の形で例示していても、CI では
            コマンド置換・heredoc が拒否されるので、その形は使わず上記の1物理行 `$'…'` に置き換える。**

            ## タスク1: PR本文のAI書き換え
            `gh pr diff ${{ steps.pr.outputs.number }}` で差分全体を読み、「何を・なぜ変えたか」を
            人間の言葉で説明する PR 本文を作成し、上記「1物理行ルール」で反映する。コミットメッセージの
            機械的な要約ではなく、差分から読み取った意図を簡潔に記述する。

            ## タスク2: ラベル付与（pr-label）
            `.claude/skills/pr-label/SKILL.md` を読み、そこに書かれた手順・基準
            （参照先の docs/policy/pr-review-policy.md を含む）に厳密に従って、
            PR #${{ steps.pr.outputs.number }} に「変更の種類」ラベルと
            needs-human-review / needs-manual-triage を付与する。

            ## タスク3: 前提条件チェック（pr-check・条件付き）
            タスク2で **needs-human-review ラベルを付けた場合のみ** 実行する。付けていなければスキップする。
            `.claude/skills/pr-check/SKILL.md` を読み、その手順に従って
            PR #${{ steps.pr.outputs.number }} をチェックする（NG のときだけ PR に1件コメントする）。

            ## 最終出力: 実行サマリ（可観測性・#69）
            すべて終えたら、最後のメッセージで次の3行を必ず出力する。後続の決定論ステップが
            この本文をラン サマリへ転記し、「何をしたか」を毎ラン残す（沈黙とスキップ／失敗を区別可能にする）。
            - task1（本文書き換え）: 実施 / 未実施（一言で理由）
            - task2（ラベル）: 付与したラベルを列挙（needs-human-review の有無を明記）
            - task3（pr-check）: 実行した(OK / NG) / スキップ（needs-human-review 無しのため）

      # advisory が「何をしたか」を毎ラン残す（#69）。AI ステップの Bash は gh に限定され
      # $GITHUB_STEP_SUMMARY へ直接書けないため、ここで実行ログ JSON を後処理する決定論ステップに分ける。
      # 出す情報を「AI が末尾に出した実行サマリ（.result）」と「拒否コマンド（.permission_denials）」だけに
      # 絞る——show_full_output / display_report で全メッセージを公開すると secret 混入リスクがある（#65/#66）。
      # AI が失敗しても痕跡を残すため always()。
      - name: Summarize advisory outcome
        if: ${{ always() && steps.pr.outputs.number != '' }}
        env:
          EXECUTION_FILE: ${{ steps.advisory.outputs.execution_file }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          echo "## AI advisory outcome — PR #$PR" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "_実行ログ無し（AI ステップが走らなかった／ログ未生成）_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # 実行ログは全メッセージの JSON 配列。末尾の result メッセージだけを取り出す。
          result=$(jq -r 'map(select(.type=="result")) | last // {} | .result // empty' "$EXECUTION_FILE")
          {
            echo "### 実行サマリ（task1/2/3）"
            printf '```\n%s\n```\n' "${result:-（サマリ出力なし）}"
          } >> "$GITHUB_STEP_SUMMARY"
          # 拒否された具体コマンド（#65 allowlist の過不足判断の材料）。
          denials=$(jq -r 'map(select(.type=="result")) | last // {} | .permission_denials // [] | .[] | "- `\(.tool_name)`: \(.tool_input | tostring)"' "$EXECUTION_FILE")
          {
            echo "### permission_denials（拒否された具体コマンド）"
            echo "${denials:-_なし_}"
          } >> "$GITHUB_STEP_SUMMARY"

  # auto-merge の有効化（cicd-design の capstone）。AI を実行せず、ラベルを読んで gh pr merge --auto
  # するだけの決定論 job（cicd-policy「機械に委ねてよいのは正解が一意に決まる作業だけ」）。
  # ★ pr-triage から独立 job に分けることで、merge に要る contents: write を AI ステップから剥がす（#66）。
  #   pr-check の NG はここに影響しない——needs-human-review 無しなら pr-check 自体を実行しておらず、
  #   判定材料はラベルだけ。gate 成功待ちは GitHub ネイティブ auto-merge に委ねる（cicd-gate が
  #   required check である限り守られる）。
  auto-merge:
    needs: pr-triage
    # pr-triage が成功し PR が解決できたときだけ。この workflow には無関係な skip ジョブが無いので
    # 伝播 skip の心配は無く、result の直接チェックで足りる（pr-triage 失敗・skip 時は連鎖 skip）。
    if: ${{ needs.pr-triage.result == 'success' && needs.pr-triage.outputs.pr_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # merge にのみ必要な write。AI を実行しないこの job だけに閉じ込める。
      contents: write
      pull-requests: write
    steps:
      # gh pr view/merge はリポジトリ文脈を git リモートから解決するため、.git が無いと
      # 「not a git repository」で落ちる。API 呼び出しだけだが git 文脈が要るので checkout する。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable auto-merge when no human review is needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ needs.pr-triage.outputs.pr_number }}
        run: |
          labels=$(gh pr view "$PR" --json labels --jq '.labels[].name')
          if grep -qx 'needs-human-review' <<< "$labels"; then
            echo "needs-human-review is set; leaving PR #$PR open for human review (no auto-merge)"
            exit 0
          fi
          echo "no needs-human-review label; enabling auto-merge (merge commit) for PR #$PR"
          gh pr merge "$PR" --auto --merge
